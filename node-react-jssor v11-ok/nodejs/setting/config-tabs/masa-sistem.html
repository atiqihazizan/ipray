<div class="system-control-section" style="margin-top: 32px;">
	<h3 class="system-control-title">
		<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
			<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
		</svg>
		Masa Sistem (Raspberry Pi)
	</h3>
	<div class="system-control-content">
		<div class="system-control-item" style="margin-bottom: 20px;">
			<div class="system-control-info">
				<div class="system-control-label">Update Tarikh & Masa</div>
				<div class="system-control-description" style="margin-bottom: 12px;">
					Set tarikh/masa sistem pada mesin (menghantar <code>sudo date -s "..."</code> pada Raspi). Selepas berjaya, paparan kiosk akan dimuat semula.
				</div>
				<div style="display: flex; flex-direction: column; gap: 12px; max-width: 320px;">
					<div>
						<label style="display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; color: #1e293b;">Tarikh & Masa:</label>
						<input type="datetime-local" id="system-datetime" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: white;">
					</div>
					<div style="display: flex; gap: 10px; flex-wrap: wrap;">
						<button type="button" onclick="setSystemTime()" class="btn-reboot" style="background: #3b82f6;">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
								<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
							</svg>
							<span>Set Masa Mesin</span>
						</button>
						<button type="button" onclick="syncTimeWithInternet()" class="btn-reboot" style="background: #10b981;">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
								<path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9a9 9 0 019-9m-9 9a9 9 0 019 9" />
							</svg>
							<span>Sync dengan Internet</span>
						</button>
					</div>
					<div id="time-set-status" class="system-control-description" style="display: none; margin-top: 4px;"></div>
				</div>
			</div>
		</div>
	</div>
</div>
