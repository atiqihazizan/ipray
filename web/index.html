<meta charset="UTF-8">

<link rel="stylesheet" href="./css/w3.css">
<link rel="stylesheet" href="./css/app.css">

<script>if (typeof module === 'object') {window.module = module; module = undefined;}</script>
<script src="./js/jquery.min.js"></script>
<script src="./js/moment-with-locales.min.js"></script>
<script src="./js/moment.min.js"></script>
<script src="./js/dexie.js"></script>
<script src="./js/mcVideoPlugin.js"></script>

<body class="bg-blackdark">

<div class="dtbar" id="datebar">
  <div class="datebar-top" id="topl">
    <div class="topdate">
      <div class="pink" id="day1">&nbsp;</div>
      <div class="date-row"><div class="white" id="hari">&nbsp;</div><div class="cyan" id="date1">&nbsp;</div></div>
    </div>
  </div>
  <div class="datebar-top" id="topr">
    <div class="topdate">
      <div class="date-row"><div class="white" id="bulan">&nbsp;</div><div class="cyan" id="date2">&nbsp;</div></div>
      <div class="pink" id="day2">&nbsp;</div>
    </div>
  </div>
</div>
<div class="dtbar" id="footbar">
  <div id="timebar" class="dnone">
    <div id="timebar1"><div id="nama0">-</div><div id="masa0">00</div></div>
    <div id="timebar2"><div id="time2"><span id="jam2">00</span><span class="dotdot" id="dot2">:</span><span id="min2">00</span></div></div>
  </div>
  <div id="masabar">
    <div class="waktu"><div class="label">SUBUH</div><div id="masa1" class="tmasa">00:00</div></div>
    <div class="waktu"><div class="label">SYURUK</div><div id="masa2" class="tmasa">00:00</div></div>
    <div class="waktu"><div class="label">ZOHOR</div><div id="masa3" class="tmasa">00:00</div></div>
    <div class="waktu"><div class="label">ASAR</div><div id="masa4" class="tmasa">00:00</div></div>
    <div class="waktu"><div class="label">MAGRIB</div><div id="masa5" class="tmasa">00:00</div></div>
    <div class="waktu"><div class="label">ISYAK</div><div id="masa6" class="tmasa">00:00</div></div>
    <div class="waktu" style="flex-grow: 1; width: 100%">&nbsp;</div>
    <div class="masa"><div id="time1"><span id="jam1">00</span><span class="dotdot" id="dot1">:</span><span id="min1">00</span></div></div>
  </div>
  <marquee id="msgbar" behavior="scroll"></marquee>
</div>

<div class="pages page0 animated" id="home"><div class="frames flxclm algc"><h1 class="maintitle cyan-shadow" id="mtitle">SELAMAT DATANG<br>&nbsp;</h1></div></div>
<div class="pages page1 animated" id="umum">
  <div class="frames flxclm algc">
    <h1 class="maintitle">PENGUMUMAN</h1>
    <div class="wfull" style="padding: 5rem 10rem">
      <div class="tablefram">
        <table id="tumum" class="table-disp striped-row">
          <thead>
          <tr><th colspan="2"><h3 class="txtum"></h3></th></tr>
          </thead>
          <tbod>
            <tr><td class="icon"><img src="./images/event-icon.png"></td><td><div class="txtum animated delay-1s" id="txtumm0">&nbsp;</div></td></tr>
            <tr><td class="icon"><img src="./images/calendar-icon.png"></td><td><div class="txtum animated delay-1s" id="txtumm1">&nbsp;</div></td></tr>
            <tr><td class="icon"><img src="./images/clock-icon.png"></td><td><div class="txtum animated delay-1s" id="txtumm2">&nbsp;</div></td></tr>
            <tr><td class="icon"><img src="./images/location-icon.png"></td><td><div class="txtum animated delay-1s" id="txtumm3">&nbsp;</div></td></tr>
            <tr><td class="icon"><img src="./images/newsletter-icon.png"></td><td><div class="txtum animated delay-1s" id="txtumm4">&nbsp;</div></td></tr>
          </tbod>
        </table>
      </div>
    </div>
    <h2 class="maintitle remain white-shadow txtum animated delay-2s" id="coutleft">&nbsp;</h2>
  </div>
</div>
<div class="pages page2 animated" id="slider"></div>
<div class="pages page3 animated" id="countdown">
  <div class="frames flxclm algc">
    <h1 class="maintitle">COUNTDOWN</h1>
    <div class="wfull" style="padding: 5rem 10rem">
      <div class="tablefram">
        <table id="tcd" class="table-disp striped-row striped-col">
          <thead>
          <tr>
            <th>PERISTIWA</th>
            <th>MASIHI</th>
            <th>HIJRAH</th>
            <th>HARI</th>
          </tr>
          </thead>
          <tbody id="rowcountdown">
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          <tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
