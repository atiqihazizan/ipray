appId: app.ipray.kiosk
productName: iPray
copyright: Copyright © 2026 iPray Team

directories:
  output: dist-electron

asar: true

files:
  - "main.js"
  - "electron-main.js"
  - "services/**/*"
  - "utils/**/*"
  - "public/**/*"
  - "setting/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/nodemon/**"

# data/ dan images/ di luar asar - boleh read/write
# Disalin ke folder bersebelahan EXE semasa build
extraResources:
  - from: "data/"
    to: "../data/"
    filter:
      - "**/*"
  - from: "images/"
    to: "../images/"
    filter:
      - "**/*"

win:
  target:
    - target: dir
      arch:
        - x64
  icon: "public/img/icon.png"

linux:
  target:
    - target: dir
      arch:
        - x64
        - arm64
  icon: "public/img/icon.png"
