<!-- Edit Dialog -->
<div id="edit-dialog" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col animate-slide-in">
        <!-- Dialog Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-6 rounded-t-2xl flex justify-between items-center">
            <h3 id="dialog-title" class="text-2xl font-bold">Edit Row</h3>
            <button class="text-white hover:text-gray-200 text-3xl font-bold leading-none transition-transform hover:rotate-90" onclick="closeDialog()">
                &times;
            </button>
        </div>
        
        <!-- Dialog Body -->
        <div class="flex-1 overflow-y-auto p-6 scrollbar-thin">
            <form id="edit-form" class="space-y-4"></form>
        </div>
        
        <!-- Dialog Footer -->
        <div class="border-t border-gray-200 p-6 flex gap-3">
            <button class="btn-cancel flex-1" onclick="closeDialog()">
                <span>✖️</span> Batal
            </button>
            <button class="btn-save flex-1" onclick="saveRow()">
                <span>💾</span> Simpan
            </button>
        </div>
    </div>
</div>
