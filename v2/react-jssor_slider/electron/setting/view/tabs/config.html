<!-- Config Tab -->
<div id="config-tab" class="tab-content active">
    <div class="content-card">
        <div class="info-box">
            <p><strong>Format:</strong> KEY|VALUE</p>
            <p style="font-size: 12px; margin-top: 8px;">💡 Hint: HOLD_DURATION dan BLINK_DURATION dalam milliseconds (1000ms = 1 saat)</p>
        </div>
        <div class="table-container">
            <table id="config-table" class="data-table">
                <thead id="config-thead"></thead>
                <tbody id="config-tbody"></tbody>
            </table>
        </div>
        <div class="flex gap-3">
            <button class="btn-reload flex-1" onclick="loadTable('config')">
                <span>🔄</span> Reload Data
            </button>
        </div>
    </div>
</div>
