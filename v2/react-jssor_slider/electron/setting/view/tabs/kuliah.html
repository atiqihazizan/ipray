<!-- Kuliah Tab -->

        <div class="info-box">
            <p><strong>Format:</strong> week|day|type|speaker|speakerId|title</p>
        </div>

            <table id="kuliah-table" class="data-table">

        <div class="flex gap-3">
            <button class="btn-reload flex-1" onclick="loadTable('kuliah')">

        </div>
    </div>
</div>
