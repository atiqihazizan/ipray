appId: app.midm.kiosk
productName: MIDM
copyright: Copyright © 2026 MIDM Team

directories:
  output: dist-electron

asar: true

files:
  - "main.js"
  - "electron-main.js"
  - "services/**/*"
  - "utils/**/*"
  - "public/**/*"
  - "setting/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/nodemon/**"

# data/, images/, bin/ di luar asar - boleh read/write
# FFmpeg binary disalin dari bin/ ke resources/bin/ (executable mesti luar asar)
# .env TIDAK disertakan (selalunya .gitignore). Salin .env ke folder yang sama dengan .exe selepas build.
extraResources:
  - from: "bin/"
    to: "bin"
    filter:
      - "ffmpeg"
      - "ffmpeg.exe"
  - from: "data/"
    to: "../data/"
    filter:
      - "**/*"
  - from: "images/"
    to: "../images/"
    filter:
      - "**/*"

win:
  target:
    - target: dir
      arch:
        - x64
  icon: "public/img/icon.png"

linux:
  target:
    - target: dir
      arch:
        - x64
        - arm64
  icon: "public/img/icon.png"
