<div class="content-card">
	<nav id="announcements-subnav" class="config-subnav">
		<button
			type="button"
			class="config-subtab active"
			data-announcements-tab="senarai"
			onclick="showAnnouncementsTab('senarai')"
		>
			Senarai Pengumuman
		</button>
		<button
			type="button"
			class="config-subtab"
			data-announcements-tab="setting"
			onclick="showAnnouncementsTab('setting')"
		>
			Setting Paparan
		</button>
	</nav>

	<!-- Panel: Senarai Pengumuman -->
	<div
		id="announcements-panel-senarai"
		class="slideshow-panel"
		style="flex:1;display:flex;flex-direction:column;min-height:0;"
	>
		<div class="flex gap-2" style="margin-bottom:10px; gap:8px;">
			<button class="btn-icon btn-add" onclick="openAddDialog()" title="Tambah Pengumuman">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg></span>
			</button>
			<button class="btn-icon btn-reload" onclick="loadTable('announcements')" title="Muat Semula">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
				</svg></span>
			</button>
		</div>
		<div class="table-container">
			<table id="announcements-table" class="data-table">
				<thead id="announcements-thead"></thead>
				<tbody id="announcements-tbody"></tbody>
			</table>
		</div>
	</div>

	<!-- Panel: Setting Paparan -->
	<div
		id="announcements-panel-setting"
		class="slideshow-panel"
		style="display:none;flex:1;flex-direction:column;min-height:0;"
	>
		<div
			id="announcements-paparan-container"
			class="gallery-container"
			style="margin-top:8px;flex:1;min-height:0;"
		>
			<div
				id="announcements-paparan-grid"
				class="gallery-grid slides-gallery-grid"
			></div>
		</div>
	</div>
</div>
