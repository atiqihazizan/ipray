<div class="system-control-section" style="margin-top: 32px;">
	<h3 class="system-control-title">
		<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
			<path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
		</svg>
		Konfigurasi WiFi
	</h3>
	<div class="system-control-content">
		<div class="system-control-item" style="margin-bottom: 20px;">
			<div class="system-control-info">
				<div class="system-control-label">Status WiFi Semasa</div>
				<div class="system-control-description" id="wifi-status-text" style="color: #64748b;">Memuatkan...</div>
			</div>
			<button type="button" class="btn-reboot" onclick="refreshWiFiStatus()" title="Refresh Status" style="background: #6b7280;">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
					<path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
				</svg>
				<span>Refresh</span>
			</button>
		</div>
		<div class="system-control-item">
			<div class="system-control-info" style="flex: 1;">
				<div class="system-control-label">Konfigurasi Sambungan WiFi</div>
				<div class="system-control-description" style="margin-bottom: 15px;">Scan available networks atau masukkan SSID dan password secara manual.</div>
				<div style="display: flex; flex-direction: column; gap: 12px;">
					<div>
						<label style="display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; color: #1e293b;">SSID:</label>
						<select id="wifi-ssid-select" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: white;">
							<option value="">-- Pilih atau masukkan SSID --</option>
						</select>
						<input type="text" id="wifi-ssid-input" placeholder="Masukkan SSID secara manual" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-top: 8px; display: none; background: white;">
					</div>
					<div>
						<label style="display: block; margin-bottom: 5px; font-size: 14px; font-weight: 500; color: #1e293b;">Password:</label>
						<input type="password" id="wifi-password" placeholder="Password (kosongkan jika open network)" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: white;">
					</div>
				</div>
			</div>
		</div>
		<div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
			<button type="button" onclick="scanWiFi()" class="btn-reboot" style="background: #3b82f6;">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
					<path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
				</svg>
				<span>Scan Networks</span>
			</button>
			<button type="button" onclick="configureWiFi()" class="btn-reboot" style="background: #10b981;">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
					<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
				</svg>
				<span>Connect WiFi</span>
			</button>
		</div>
	</div>
</div>
