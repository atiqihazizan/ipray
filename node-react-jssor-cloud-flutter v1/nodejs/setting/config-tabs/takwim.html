<!-- Card 3: Muat Naik Fail Takwim -->
<div class="config-group">
	<div class="config-group-header">
		<h3 class="config-group-header-title">Muat Naik Fail Takwim</h3>
	</div>
	<div class="config-group-items">
		<div class="config-item">
			<label class="config-item-label" for="takwim-upload">Fail (.txt)</label>
			<div class="config-item-control">
				<input type="file" id="takwim-upload" accept=".txt" class="config-file-input" />
				<button type="button" class="btn-save" onclick="uploadTakwimFile()">Muat Naik</button>
			</div>
		</div>
	</div>
</div>
