<div class="content-card">
	<div style="padding: 6px 0 12px; color: #64748b; font-size: 12px;">
		Penceramah kini berada di bawah <strong>Kuliah → Pengkuliah</strong>.
	</div>
	<div class="flex justify-between items-center gap-2 mb-3" style="flex-shrink: 0; margin-bottom: 10px;">
		<div class="flex gap-2">
			<button type="button" class="btn-icon" onclick="showTab('kuliah'); setTimeout(() => window.showKuliahTab && window.showKuliahTab('pengkuliah'), 0);" title="Pergi ke Kuliah > Pengkuliah">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg></span>
			</button>
			<button class="btn-icon btn-add" onclick="openAddDialog()" title="Tambah Pengkuliah">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg></span>
			</button>
		</div>
	</div>
	<div class="table-container">
		<table id="penceramah-table" class="data-table">
			<thead id="penceramah-thead"></thead>
			<tbody id="penceramah-tbody"></tbody>
		</table>
	</div>
</div>
