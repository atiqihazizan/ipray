<!-- Card 1: Zon JAKIM -->
<div class="config-group config-group--takwim-zone">
	<div class="config-group-header config-group-header--takwim">
		<span class="config-group-header-icon" aria-hidden="true">🕌</span>
		<h3 class="config-group-header-title">Zon JAKIM</h3>
	</div>
	<div class="config-group-items">
		<div class="config-item">
			<label class="config-item-label" for="TAKWIM_ZONE">Zon</label>
			<div class="config-item-control">
				<select id="TAKWIM_ZONE" class="config-select config-select--takwim">
					<option value="">Memuatkan senarai zon...</option>
				</select>
			</div>
		</div>
		<div class="config-item config-item--action">
			<div class="config-item-control config-item-control--full">
				<button type="button" class="btn-sync-jakim" id="btn-sync-year" onclick="syncJakimYear()">
					<svg class="btn-sync-jakim-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M22 11.5A10 10 0 0 0 3.2 7.2L2.5 8"/><path d="M2 12.5a10 10 0 0 0 18.8 4.3l.7-.8"/></svg>
					Sync dari Jakim
				</button>
			</div>
		</div>
	</div>
</div>
