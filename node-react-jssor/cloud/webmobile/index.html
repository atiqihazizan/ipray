<!DOCTYPE html>
<html lang="ms">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
	<meta name="mobile-web-app-capable" content="yes">
	<title>iPray - Webmobile</title>
	<link rel="stylesheet" href="output.css">
	<link rel="stylesheet" href="css/table.css">
	<link rel="stylesheet" href="css/dialog.css">
	<link rel="stylesheet" href="css/crard.css">
	<link rel="stylesheet" href="css/layout.css">
</head>

<body class="webmobile-body">
	<div id="sidebar-placeholder"></div>
	<!-- Backdrop when sidebar open on mobile (tap to close) -->
	<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()" aria-hidden="true"></div>

	<!-- Main Content -->
	<main class="main-content">
		<!-- Top Header -->
		<header class="top-header">
			<div class="top-header-content">
				<div>
					<h1 class="page-title" id="page-title">
						<span id="page-icon">☁️</span>
						<span id="page-name">Cloud Config</span>
					</h1>
				</div>
				<div class="connection-status-wrap">
					<div class="connection-status">
						<div class="status-dot" id="status-dot"></div>
						<span id="connection-status">Connecting...</span>
					</div>
					<div class="connection-status local-connection-status">
						<div class="status-dot" id="local-status-dot"></div>
						<span id="local-status">Local: —</span>
					</div>
				</div>
			</div>
		</header>

		<!-- Content Wrapper -->
		<div class="content-wrapper">
			<div id="tab-content-container" class="tab-content active" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div>
		</div>
	</main>

	<!-- Mobile Sidebar Toggle -->
	<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

	<!-- Notification Toast -->
	<div id="notification"
		class="fixed top-4 right-4 max-w-md transform translate-x-[500px] transition-all duration-300 z-50"></div>

	<!-- Sync overlay: tiada interruption semasa upload/sync -->
	<div id="sync-overlay" class="sync-overlay" style="display: none;" aria-hidden="true">
		<div class="sync-overlay-content">
			<div class="sync-overlay-spinner"></div>
			<p class="sync-overlay-text">Sedang sync dengan local</p>
		</div>
	</div>

	<!-- Edit Dialog -->
	<div id="edit-dialog" class="fixed inset-0 z-50 p-4" style="display: none;">
		<div id="edit-dialog-backdrop" onclick="closeDialog()" style="position:absolute;inset:0;cursor:pointer" aria-label="Tutup dialog"></div>
		<div class="edit-dialog-content" style="position:relative;z-index:1;">
			<!-- Dialog Header -->
			<div class="bg-gradient-to-r flex justify-between items-center">
				<h3 id="dialog-title">Edit Row</h3>
				<button onclick="closeDialog()" aria-label="Close dialog">
					&times;
				</button>
			</div>

			<!-- Dialog Body -->
			<div class="flex-1 overflow-y-auto">
				<form id="edit-form"></form>
			</div>

			<!-- Dialog Footer -->
			<div class="border-t flex gap-3">
				<button class="btn-cancel" onclick="closeDialog()">
					Batal
				</button>
				<button class="btn-save" onclick="saveRow()">
					Simpan
				</button>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
	<script src="js/socket.io.min.js"></script>
	<!-- Load utility scripts first -->
	<script src="js/dateUtils.js"></script>

	<!-- Load modular scripts -->
	<script type="module" src="js/config.js"></script>
	<script type="module" src="js/state.js"></script>
	<script type="module" src="js/notification.js"></script>
	<script type="module" src="js/cloud-socket.js"></script>
	<script type="module" src="js/cloud-api.js"></script>
	<script type="module" src="js/inline-functions.js"></script>
	<script type="module" src="js/dialog.js"></script>
	<script type="module" src="js/gallery.js"></script>
	<script type="module" src="js/table-utils.js"></script>
	<script type="module" src="js/table.js"></script>
	<script type="module" src="js/config-tabs.js"></script>
	<script type="module" src="js/wifi.js"></script>
	<script type="module" src="js/main.js"></script>
</body>

</html>
