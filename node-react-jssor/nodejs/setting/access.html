<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPray - Quick Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #667eea; margin-bottom: 20px; font-size: 2.5em; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .links { display: flex; gap: 20px; flex-direction: column; }
        .link-btn {
            display: block;
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .link-btn.secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }
        .link-btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 0.9em;
            color: #666;
        }
        .info code {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 iPray Access</h1>
        <p>Pilih panel yang ingin diakses</p>
        
        <div class="links">
            <a href="http://localhost:3001" class="link-btn">
                ⚙️ Setting Panel
            </a>
            <a href="http://localhost:3000" class="link-btn secondary">
                📺 Public Display
            </a>
        </div>
        
        <div class="info">
            <strong>Port Configuration:</strong><br>
            Setting: <code>3001</code><br>
            Public: <code>3000</code>
        </div>
    </div>
</body>
</html>
