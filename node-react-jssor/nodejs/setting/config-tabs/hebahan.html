<div class="config-group">
	<h3 class="config-group-title">Tetapan Marquee</h3>
	<div class="config-group-items">
		<div class="config-item">
			<label>Aktif</label>
			<div class="config-item-control">
				<button type="button" id="MARQUEE_ENABLED_toggle" class="btn-toggle" onclick="toggleConfigBool('MARQUEE_ENABLED')"></button>
			</div>
		</div>
		<div class="config-item">
			<label for="MARQUEE_DURATION">Kelajuan (saat per pusingan)</label>
			<div class="config-item-control">
				<input type="number" id="MARQUEE_DURATION" name="MARQUEE_DURATION" placeholder="25" min="5" max="120" onchange="saveConfigItem('MARQUEE_DURATION')" />
				<span class="config-unit">s</span>
			</div>
		</div>
		<div class="config-item">
			<label for="MARQUEE_SEPARATOR">Pemisah Mesej</label>
			<div class="config-item-control">
				<!-- <input type="text" id="MARQUEE_SEPARATOR" name="MARQUEE_SEPARATOR" placeholder="•" onchange="saveConfigItem('MARQUEE_SEPARATOR')" style="width: 90px; text-align: center; font-size: 18px;" /> -->
				<button type="button" id="MARQUEE_SEPARATOR_btn" class="btn-capsule" style="padding: 3px 10px; font-size: 18px; min-width: 48px;" onclick="openSeparatorPicker()" title="Pilih simbol / emoji">•</button>
				<dialog id="sep-picker-dialog" onclick="if(event.target===this)this.close()">
					<div style="padding: 16px;">
						<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
							<span style="font-size: 14px; font-weight: 600; color: #374151;">Pilih Pemisah</span>
							<button type="button" class="btn-icon btn-delete" onclick="document.getElementById('sep-picker-dialog').close()" title="Tutup" style="width:28px;height:28px;">
								<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></span>
							</button>
						</div>
						<p style="font-size: 11px; color: #9ca3af; margin: 0 0 6px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Simbol</p>
						<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px;">
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('•')">•</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('◆')">◆</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('║')">║</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('—')">—</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('❖')">❖</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('✦')">✦</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('✿')">✿</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('❁')">❁</button>
						</div>
						<p style="font-size: 11px; color: #9ca3af; margin: 0 0 6px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Islamik</p>
						<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px;">
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('☪')">☪</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('۞')">۞</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('۩')">۩</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🕌')">🕌</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🕋')">🕋</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('📿')">📿</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🤲')">🤲</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🌙')">🌙</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('✨')">✨</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('💚')">💚</button>
						</div>
						<p style="font-size: 11px; color: #9ca3af; margin: 0 0 6px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Lain-lain</p>
						<div style="display: flex; flex-wrap: wrap; gap: 4px;">
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('⭐')">⭐</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🌟')">🌟</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🌺')">🌺</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🌸')">🌸</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🌿')">🌿</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('💎')">💎</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🎯')">🎯</button>
							<button class="btn-capsule" style="padding:4px 10px;font-size:18px;" onclick="pickSeparator('🔮')">🔮</button>
						</div>
					</div>
				</dialog>
				<!-- <button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('MARQUEE_SEPARATOR')" title="Simpan">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button> -->
			</div>
		</div>
	</div>
</div>

<div class="config-group config-group--with-table" style="margin-top: 24px;">
	<div class="config-group-header">
		<h3 class="config-group-header-title">Data Hebahan</h3>
		<div class="config-group-header-actions">
			<button type="button" class="btn-icon btn-capsule btn-add" onclick="openAddDialog()" title="Tambah Hebahan">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg></span>
			</button>
			<button type="button" class="btn-icon btn-capsule btn-reload" onclick="loadTable('hebahan')" title="Muat Semula">
				<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></span>
			</button>
		</div>
	</div>
	<div class="config-table-wrap">
		<div class="table-container table-container--no-border">
			<table id="hebahan-table" class="data-table data-table--compact">
				<thead id="hebahan-thead"></thead>
				<tbody id="hebahan-tbody"></tbody>
			</table>
		</div>
	</div>
</div>
