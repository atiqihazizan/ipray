<!-- Announcements Tab -->

        <!-- Button Group Above Table -->
        <div class="flex justify-end gap-2 mb-3">
            <button class="btn-icon btn-add" onclick="openAddDialog()" title="Tambah Pengumuman">
                <span>➕</span>
            </button>
            <button class="btn-icon btn-reload" onclick="loadTable('announcements')" title="Reload Data">

            <table id="announcements-table" class="data-table">
                <thead id="announcements-thead"></thead>
                <tbody id="announcements-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
