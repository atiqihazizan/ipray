<!-- Images Tab -->
<div id="images-tab" class="tab-content">
    <div class="content-card">
        <!-- Button Group Above Table -->
        <div class="flex justify-end gap-2 mb-3">
            <button class="btn-icon btn-add" onclick="openAddDialog()" title="Tambah Image">
                <span>➕</span>
            </button>
            <button class="btn-icon btn-reload" onclick="loadTable('images')" title="Reload Data">
                <span>🔄</span>
            </button>
        </div>
        <div class="table-container">
            <table id="images-table" class="data-table">
                <thead id="images-thead"></thead>
                <tbody id="images-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
