<div class="config-group overflow-x-auto">
	<h3 class="config-group-title">Waktu Solat - Konfigurasi Masa</h3>
	<div class="config-group-items">
		<div class="config-item">
			<label for="HOLD_DURATION">Hold Duration</label>
			<div class="config-item-control">
				<input type="number" id="HOLD_DURATION" name="HOLD_DURATION" placeholder="milliseconds" />
				<span class="config-unit">ms</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('HOLD_DURATION')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="BLINK_DURATION">Blink Duration</label>
			<div class="config-item-control">
				<input type="number" id="BLINK_DURATION" name="BLINK_DURATION" placeholder="milliseconds" />
				<span class="config-unit">ms</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('BLINK_DURATION')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="WARNING_START_SECONDS">Warning Start Time</label>
			<div class="config-item-control">
				<input type="number" id="WARNING_START_SECONDS" name="WARNING_START_SECONDS" placeholder="seconds" />
				<span class="config-unit">s</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('WARNING_START_SECONDS')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
	</div>
</div>

<div class="config-group">
	<h3 class="config-group-title">Waktu Solat - Alert & Amaran</h3>
	<div class="config-group-items">
		<div class="config-item">
			<label for="BEEP_COUNT">Beep Count</label>
			<div class="config-item-control">
				<input type="number" id="BEEP_COUNT" name="BEEP_COUNT" placeholder="count" />
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('BEEP_COUNT')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="WARNING_BEEP_COUNT">Warning Beep Count</label>
			<div class="config-item-control">
				<input type="number" id="WARNING_BEEP_COUNT" name="WARNING_BEEP_COUNT" placeholder="count" />
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('WARNING_BEEP_COUNT')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
	</div>
</div>

<div class="config-group">
	<h3 class="config-group-title">Waktu Solat - Masuk Waktu (Azan, Iqamah & Solat)</h3>
	<div class="config-group-items">
		<div class="config-item">
			<label for="AZAN_DURATION_MIN">Azan Duration</label>
			<div class="config-item-control">
				<input type="number" id="AZAN_DURATION_MIN" name="AZAN_DURATION_MIN" placeholder="min" min="0.1" step="0.1" />
				<span class="config-unit">min</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('AZAN_DURATION_MIN')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="IQAMAH_DURATION_MIN">Iqamah Duration</label>
			<div class="config-item-control">
				<input type="number" id="IQAMAH_DURATION_MIN" name="IQAMAH_DURATION_MIN" placeholder="min" min="0.5" step="0.5" />
				<span class="config-unit">min</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('IQAMAH_DURATION_MIN')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="SOLAT_DURATION_MIN">Solat Duration</label>
			<div class="config-item-control">
				<input type="number" id="SOLAT_DURATION_MIN" name="SOLAT_DURATION_MIN" placeholder="minutes" min="1" />
				<span class="config-unit">min</span>
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('SOLAT_DURATION_MIN')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
	</div>
</div>

<div class="config-group">
	<h3 class="config-group-title">Waktu Solat - Warna</h3>
	<div class="config-group-items">
		<div class="config-item">
			<label for="COLOR_DEFAULT">Default Color</label>
			<div class="config-item-control">
				<input type="color" id="COLOR_DEFAULT" name="COLOR_DEFAULT" />
				<input type="text" id="COLOR_DEFAULT_text" placeholder="#000000" class="color-text-input" />
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('COLOR_DEFAULT')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="COLOR_NEXT_PRAYER">Next Prayer Color</label>
			<div class="config-item-control">
				<input type="color" id="COLOR_NEXT_PRAYER" name="COLOR_NEXT_PRAYER" />
				<input type="text" id="COLOR_NEXT_PRAYER_text" placeholder="#000000" class="color-text-input" />
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('COLOR_NEXT_PRAYER')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
		<div class="config-item">
			<label for="COLOR_WARNING_PRAYER">Warning Prayer Color</label>
			<div class="config-item-control">
				<input type="color" id="COLOR_WARNING_PRAYER" name="COLOR_WARNING_PRAYER" />
				<input type="text" id="COLOR_WARNING_PRAYER_text" placeholder="#000000" class="color-text-input" />
				<button type="button" class="btn-icon btn-edit" onclick="saveConfigItem('COLOR_WARNING_PRAYER')" title="Save">
					<span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg></span>
				</button>
			</div>
		</div>
	</div>
</div>
